<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV-Data-Explorer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <div class="loader">
      <span>Loading...</span>
    </div>
    <header class="header-div">
      <input type="file" class="select-file" accept=".csv" />

      <div class="header-btns">
        <div class="upload-btn">Upload</div>
        <div class="export-btn">Export</div>
      </div>
    </header>
    <main class="main-div">
      <div class="main-header">
        <div class="pagination-div">
          <div class="page-size-div">
            <select name="page-size-select" id="page-size">
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>

          <div class="current-page-div">
            <input
              type="number"
              class="current-page-number"
              min="1"
              max="9"
              value="1"
            />
            <!-- <div class="current-page-number">1</div> -->
            <span class="slash">/</span>
            <div class="total-page">100</div>
          </div>

          <div class="page-change-btns">
            <div class="prev-btn">Prev</div>
            <div class="next-btn">Next</div>
            <div class="delete-btn">Delete</div>
          </div>
        </div>

        <div class="search-div">
          <input type="text" class="search" placeholder="Search" />
        </div>
        <div class="add-and-reset-btns">
          <div class="reset-btn">Reset</div>
          <div class="add-data-btn">Add Data</div>
        </div>
      </div>
      <div class="main-table-div">
        <div class="table-container">
          <span class="empty">EMPTY</span>
          <table>
            <thead>
              <!-- <tr>
                <th><input type="checkbox" /></th>

                  department<i class="fa-solid fa-arrow-up-long arrow"></i>

              </tr> -->
