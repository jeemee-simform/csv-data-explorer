<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV-Data-Explorer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <!-- loader -->
    <div class="loader back-hide">
      <span>Loading...</span>
    </div>

    <!-- header -->
    <header class="header-div">
      <!-- file choose -->
      <input type="file" class="select-file" accept=".csv" />

      <!-- upload and export btn  -->
      <div class="header-btns">
        <div class="upload-btn">Upload</div>
        <div class="export-btn">Export</div>
      </div>
    </header>

    <!-- main content  -->
    <main class="main-div">
      <!-- main content header -->
      <div class="main-header">
        <!-- all pagination related functionality -->
        <div class="pagination-div">
          <div class="page-size-div">
            <select name="page-size-select" id="page-size" class="page-size">
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>

          <div class="current-page-div">
            <input type="number" class="current-page-number" min="1" max="9" />
            <span class="slash">/</span>
            <div class="total-page">100</div>
          </div>

          <div class="page-change-btns">
            <div class="prev-btn">Prev</div>
            <div class="next-btn">Next</div>
            <div class="delete-btn">Delete</div>
          </div>
        </div>

        <!-- all search re;lated functionality -->
        <div class="search-div">
          <input type="text" class="search" placeholder="Search" />
          <select
            name="column"
            id="column-search"
            class="column-search"
          ></select>
        </div>

        <!-- reset and add data btn -->
        <div class="add-and-reset-btns">
          <div class="reset-btn">Reset</div>
          <div class="add-data-btn">Add Data</div>
        </div>
      </div>

      <!-- main table view  -->
      <div class="main-table-div">
        <div class="table-container">
          <span class="empty">EMPTY</span>
          <table>
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- add data modal -->
    <div id="modalOverlay" class="modal-overlay back-hide">
      <div class="modal">
        <!-- header -->
        <div class="modal-header">
          <h3>Add Data</h3>
          <span id="closeModal" class="close-btn">✖</span>
        </div>

        <!-- dynamic form goes here -->
        <form id="dynamicForm" class="dynamic-form"></form>

        <!-- footer -->
        <div class="modal-footer">
          <button id="cancelBtn" class="cancel-btn" type="button">
            Cancel
          </button>
          <button type="submit" form="dynamicForm">Save</button>
        </div>
      </div>
    </div>

    <script src="./src/main.js" type="module"></script>
  </body>
</html>
