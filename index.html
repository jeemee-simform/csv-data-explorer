<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV-Data-Explorer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <div class="loader">
      <span>Loading...</span>
    </div>
    <header class="header-div">
      <input type="file" class="select-file" accept=".csv" />

      <div class="header-btns">
        <div class="upload-btn">Upload</div>
        <div class="export-btn">Export</div>
      </div>
    </header>
    <main class="main-div">
      <div class="main-header">
        <div class="pagination-div">
          <div class="page-size-div">
            <select name="page-size-select" id="page-size" class="page-size">
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>

          <div class="current-page-div">
            <input type="number" class="current-page-number" min="1" max="9" />
            <span class="slash">/</span>
            <div class="total-page">100</div>
          </div>

          <div class="page-change-btns">
            <div class="prev-btn">Prev</div>
            <div class="next-btn">Next</div>
            <div class="delete-btn">Delete</div>
          </div>
        </div>

        <div class="search-div">
          <input type="text" class="search" placeholder="Search" />
          <select name="column" id="column-search" class="column-search">
            <option value="all-column">All Column</option>
          </select>
        </div>
        <div class="add-and-reset-btns">
          <div class="reset-btn">Reset</div>
          <div class="add-data-btn">Add Data</div>
        </div>
      </div>
      <div class="main-table-div">
        <div class="table-container">
          <span class="empty">EMPTY</span>
          <table>
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="./src/main.js" type="module"></script>

    <button style="display: none" onclick="generateCSV()">Download CSV</button>
    <script>
      function randomText(length = 8) {
        const chars = "abcdefghijklmnopqrstuvwxyz";
        let result = "";
        for (let i = 0; i < length; i++) {
          result += chars[Math.floor(Math.random() * chars.length)];
        }
        return result;
      }

      function randomNumber() {
        return Math.floor(Math.random() * 100000);
      }

      function randomDate() {
        const start = new Date(2000, 0, 1).getTime();
        const end = Date.now();
        const d = new Date(start + Math.random() * (end - start));
        return d.toISOString().split("T")[0];
      }

      async function generateCSV() {
        const TOTAL_ROWS = 1_000_000;
        const COLUMNS = 15;
        const CHUNK_SIZE = 10000;

        const parts = [];

        // Header
        const headers = [];
        for (let i = 1; i <= COLUMNS; i++) {
          headers.push(`column_${i}`);
        }
        parts.push(headers.join(",") + "\n");

        for (let i = 0; i < TOTAL_ROWS; i += CHUNK_SIZE) {
          let chunk = "";

          for (let j = 0; j < CHUNK_SIZE && i + j < TOTAL_ROWS; j++) {
            const row = [];

            for (let col = 0; col < COLUMNS; col++) {
              if (col % 3 === 0) {
                row.push(randomText());
              } else if (col % 3 === 1) {
                row.push(randomNumber());
              } else {
                row.push(randomDate());
              }
            }

            chunk += row.join(",") + "\n";
          }

          parts.push(chunk);

          // Let UI breathe (prevents freezing)
          await new Promise((resolve) => setTimeout(resolve, 0));

          if ((i + CHUNK_SIZE) % 100000 === 0) {
            console.log(`Generated ${i + CHUNK_SIZE} rows`);
          }
        }

        // Create Blob and download
        const blob = new Blob(parts, { type: "text/csv" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "large_dataset.csv";
        a.click();

        URL.revokeObjectURL(url);
      }
    </script>
  </body>
</html>
